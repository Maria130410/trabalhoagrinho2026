<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Forte, Futuro Sustentável</title>
    <style>
        /* Reset e Estilos Gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f5;
            color: #333;
            line-height: 1.6;
        }

        /* Cabeçalho / Hero Banner */
        header {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1625246333195-78d9c38ad451?q=80&w=1200') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        header p {
            font-size: 1.3rem;
            max-width: 800px;
            margin: 0 auto;
            font-weight: 300;
        }

        /* Container Principal */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Seção Sobre / Introdução */
        .intro {
            text-align: center;
            margin-bottom: 60px;
        }

        .intro h2 {
            color: #2c5e3b;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .intro p {
            font-size: 1.1rem;
            color: #555;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Grid de Pilares Informativos */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 25px;
        }

        .card-content h3 {
            color: #2c5e3b;
            margin-bottom: 12px;
            font-size: 1.4rem;
        }

        .card-content p {
            color: #666;
            font-size: 0.95rem;
        }

        /* Destaque Centralizado */
        .highlight-box {
            background-color: #2c5e3b;
            color: white;
            padding: 40px;
            border-radius
